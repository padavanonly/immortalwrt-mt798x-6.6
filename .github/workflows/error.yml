name: Fetch build error logs

on:
  workflow_run:
    workflows: ["Build ImmortalWrt mt798x devices"]
    types:
      - completed

jobs:
  fetch-logs:
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read

    steps:
      - name: Show source run
        run: |
          echo "Run ID: ${{ github.event.workflow_run.id }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Workflow: ${{ github.event.workflow_run.name }}"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq unzip

      - name: Fetch artifacts list
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          curl -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/artifacts" \
            -o artifacts.json
          cat artifacts.json

      - name: Download debug artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p downloaded
          jq -r '.artifacts[] | select(.name | startswith("debug-")) | "\(.id) \(.name)"' artifacts.json | while read id name; do
            echo "Downloading $name ($id)"
            curl -L \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/artifacts/$id/zip" \
              -o "$name.zip"
            mkdir -p "downloaded/$name"
            unzip -o "$name.zip" -d "downloaded/$name"
          done

      - name: Show last 150 lines from build logs
        run: |
          found=0
          find downloaded -name build.log -type f | while read f; do
            found=1
            echo "===== $f ====="
            tail -n 150 "$f" || true
            echo
            echo "===== MATCHED ERROR LINES IN $f ====="
            grep -nEi "error:|Error |No rule|failed to build|undefined reference|dts|dtc|recipe for target" "$f" | tail -n 200 || true
            echo
          done
          if ! find downloaded -name build.log -type f | grep -q .; then
            echo "No build.log found in artifacts."
          fi

      - name: Upload collected logs
        uses: actions/upload-artifact@v4
        with:
          name: fetched-error-logs
          path: |
            artifacts.json
            downloaded/
