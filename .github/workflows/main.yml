name: Build ImmortalWrt mt798x devices

on:
  workflow_dispatch:
  push:
    branches:
      - openwrt-24.10-6.6

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - device_name: nradio_c5800-688
            config_device: nradio_c5800_688
            artifact_name: firmware-nradio-c5800-688
          - device_name: nradio_c8-688
            config_device: nradio_c8_688
            artifact_name: firmware-nradio-c8-688

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show disk space
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker image prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libncursesw5-dev libssl-dev \
            python3 python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget libelf-dev subversion libpam0g-dev ccache xsltproc upx-ucl \
            libpython3-dev qemu-utils curl cmake ninja-build pkgconf meson \
            python3-pyelftools device-tree-compiler rename tar time

      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Check build prerequisites
        run: |
          make prereq V=s

      - name: Generate .config for ${{ matrix.device_name }}
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_${{ matrix.config_device }}=y
          EOF
          make defconfig
          echo "==== Selected target ===="
          grep "^CONFIG_TARGET_" .config || true

      - name: Check device exists
        run: |
          echo "==== Find device definition ===="
          grep -R "define Device/" target/linux/mediatek/image/ || true
          echo "==== Match current device ===="
          grep -R "${{ matrix.device_name }}" target/linux/mediatek/image/ || true

      - name: Download source packages
        run: |
          make download -j8 V=s

      - name: Build firmware
        run: |
          make -j"$(nproc)" V=s

      - name: Show output files
        run: |
          find bin/targets -type f | sort || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            bin/targets/**/*
