name: Build ImmortalWrt filogic firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: "选择要编译的设备"
        required: true
        default: all
        type: choice
        options:
          - all
          - nradio_c5800-688
          - nradio_c8-688

  push:
    branches:
      - openwrt-24.10-6.6
      - mtwifi-sync-*
    paths:
      - .github/workflows/main.yml
      - target/linux/mediatek/image/filogic.mk
      - target/linux/mediatek/dts/**
      - target/linux/mediatek/filogic/base-files/**
      - package/mtk/drivers/conninfra/**
      - package/mtk/drivers/mt_wifi/**
      - package/mtk/drivers/warp/**
      - package/mtk/drivers/wifi-profile/**
      - package/mtk/applications/mtwifi-cfg/**
      - package/mtk/applications/luci-app-mtwifi-cfg/**
      - package/mtk/applications/5g-modem/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.device || 'push' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.device }}" in
              all)
                echo 'matrix={"device":["nradio_c5800-688","nradio_c8-688"]}' >> "$GITHUB_OUTPUT"
                ;;
              nradio_c5800-688)
                echo 'matrix={"device":["nradio_c5800-688"]}' >> "$GITHUB_OUTPUT"
                ;;
              nradio_c8-688)
                echo 'matrix={"device":["nradio_c8-688"]}' >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "Unsupported device: ${{ github.event.inputs.device }}" >&2
                exit 1
                ;;
            esac
          else
            echo 'matrix={"device":["nradio_c5800-688","nradio_c8-688"]}' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.device }}
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    env:
      TARGET: mediatek
      SUBTARGET: filogic
      DEVICE: ${{ matrix.device }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPRESS: "1"
      CCACHE_MAXSIZE: 8G

    steps:
      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git rsync swig unzip \
            zlib1g-dev file wget curl ccache subversion device-tree-compiler python3 \
            python3-pyelftools python3-ply python3-docutils python3-setuptools libelf-dev \
            ecj fastjar java-propose-classpath libc6-dev-i386 libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libreadline-dev libssl-dev libncurses5-dev \
            libncursesw5-dev uglifyjs libyaml-dev msmtp texinfo xmlto qemu-utils genisoimage \
            help2man ninja-build p7zip-full ca-certificates squashfs-tools
          ccache --version
          ccache -M "${CCACHE_MAXSIZE}"

      - name: Restore dl cache
        id: restore-dl-cache
        uses: actions/cache/restore@v4
        with:
          path: dl
          key: ${{ runner.os }}-dl-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-dl-${{ github.ref_name }}-
            ${{ runner.os }}-dl-

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-${{ env.DEVICE }}-ccache-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEVICE }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-${{ env.DEVICE }}-ccache-
            ${{ runner.os }}-ccache-

      - name: Update and install feeds
        shell: bash
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Patch libffi feed for runner build
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('feeds/packages/libs/libffi/Makefile')
          text = path.read_text()
          old = "\n".join([
              "\t$(CP) \\",
              "\t\t$(PKG_BUILD_DIR)/$(GNU_TARGET_NAME)*/fficonfig.h \\",
              "\t\t$(1)/usr/include/",
              "",
          ])
          new = "\n".join([
              "\tconf_h=''; \\",
              "\tfor p in \\",
              "\t\t$(PKG_BUILD_DIR)/$(GNU_TARGET_NAME)*/fficonfig.h \\",
              "\t\t$(PKG_BUILD_DIR)/*/fficonfig.h \\",
              "\t\t$(PKG_BUILD_DIR)/fficonfig.h; do \\",
              "\t\tcase \"$$$$p\" in \\",
              "\t\t\t*msvc_build*) continue ;; \\",
              "\t\tesac; \\",
              "\t\tif [ -f \"$$$$p\" ]; then \\",
              "\t\t\tconf_h=\"$$$$p\"; \\",
              "\t\t\tbreak; \\",
              "\t\tfi; \\",
              "\tdone; \\",
              "\t[ -n \"$$$$conf_h\" ] && $(CP) \"$$$$conf_h\" $(1)/usr/include/",
              "",
          ])
          if old not in text:
              raise SystemExit('libffi Makefile patch context not found')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Generate .config
        shell: bash
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_${DEVICE}=y
          CONFIG_CCACHE=y
          CONFIG_PACKAGE_kmod-conninfra=y
          CONFIG_MTK_CONNINFRA_APSOC=y
          CONFIG_MTK_CONNINFRA_APSOC_MT7981=y
          CONFIG_PACKAGE_kmod-mediatek_hnat=y
          CONFIG_PACKAGE_kmod-mt_wifi=y
          CONFIG_PACKAGE_kmod-warp=y
          CONFIG_WARP_VERSION=2
          CONFIG_WARP_CHIPSET="mt7981"
          CONFIG_PACKAGE_wifi-dats=y
          CONFIG_PACKAGE_wifi-profile=y
          CONFIG_PACKAGE_mtwifi-cfg=y
          CONFIG_PACKAGE_luci-app-mtwifi-cfg=y
          CONFIG_PACKAGE_mtk-smp=y
          CONFIG_PACKAGE_adb=y
          CONFIG_PACKAGE_libatomic=y
          CONFIG_PACKAGE_libevdev=y
          CONFIG_PACKAGE_libusb-1.0=y
          CONFIG_PACKAGE_libudev-zero=y
          CONFIG_PACKAGE_usbutils=y
          CONFIG_PACKAGE_usbids=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_python3-light=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          EOF

          if [ "${DEVICE}" = "nradio_c5800-688" ]; then
            cat >> .config <<EOF
          CONFIG_PACKAGE_luci-app-c5800-688-wtmodem=y
          EOF
          fi

          make defconfig

          grep -E "CONFIG_TARGET_mediatek|CONFIG_TARGET_mediatek_filogic|CONFIG_TARGET_mediatek_filogic_DEVICE_${DEVICE}|CONFIG_CCACHE|CONFIG_MTK_CONNINFRA_APSOC|CONFIG_MTK_CONNINFRA_APSOC_MT7981|CONFIG_PACKAGE_kmod-mediatek_hnat|CONFIG_PACKAGE_kmod-mt_wifi|CONFIG_PACKAGE_kmod-warp|CONFIG_WARP_VERSION|CONFIG_WARP_CHIPSET|CONFIG_PACKAGE_mtwifi-cfg|CONFIG_PACKAGE_luci-app-mtwifi-cfg|CONFIG_PACKAGE_mtk-smp|CONFIG_PACKAGE_adb|CONFIG_PACKAGE_libatomic|CONFIG_PACKAGE_libevdev|CONFIG_PACKAGE_libusb-1.0|CONFIG_PACKAGE_libudev-zero|CONFIG_PACKAGE_usbutils|CONFIG_PACKAGE_usbids|CONFIG_PACKAGE_luci-app-c5800-688-wtmodem" .config

      - name: Download sources
        shell: bash
        run: |
          set -euxo pipefail
          make download -j"$(nproc)"

      - name: Bootstrap host build tools
        shell: bash
        run: |
          set -euxo pipefail
          make tools/ninja/compile -j1 V=s
          [ -x staging_dir/host/bin/ninja ]
          staging_dir/host/bin/ninja --version

      - name: Build firmware
        shell: bash
        run: |
          set -o pipefail
          ccache -z
          make -j"$(nproc)" V=s 2>&1 | tee build.log
          ccache -s | tee ccache.log

      - name: Sanity check firmware
        shell: bash
        run: |
          set -euo pipefail
          firmware_dir="bin/targets/${TARGET}/${SUBTARGET}"
          image="$(find "$firmware_dir" -maxdepth 1 -type f -name "*${DEVICE}*sysupgrade.bin" | head -n1)"

          if [ -z "$image" ]; then
            echo "No sysupgrade image found for ${DEVICE}" >&2
            find "$firmware_dir" -maxdepth 1 -type f -printf '%f\n' | sort
            exit 1
          fi

          workdir="$(mktemp -d)"
          tar -xf "$image" -C "$workdir"

          if [ ! -f "$workdir/root" ]; then
            echo "Extracted sysupgrade tar is missing root squashfs image" >&2
            find "$workdir" -maxdepth 1 -type f -printf '%f\n' | sort
            exit 1
          fi

          unsquashfs -d "$workdir/rootfs" "$workdir/root" >/dev/null

          startwapp_refs="$(grep -Rsn 'startwapp\.sh' "$workdir/rootfs" 2>/dev/null || true)"
          if [ -n "$startwapp_refs" ] && ! find "$workdir/rootfs" -type f -name 'startwapp.sh' | grep -q .; then
            echo "startwapp.sh is referenced in rootfs but missing:" >&2
            echo "$startwapp_refs" >&2
            exit 1
          fi

          image_bytes="$(stat -c%s "$image")"
          {
            echo "### Firmware Sanity"
            echo "- Device: ${DEVICE}"
            echo "- Image: $(basename "$image")"
            echo "- Size: ${image_bytes} bytes"
            if grep -Rqs "encryption='none'" "$workdir/rootfs/etc/config" "$workdir/rootfs/etc/uci-defaults" 2>/dev/null; then
              echo "- Warning: open wireless defaults detected in rootfs"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect firmware
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact

          python3 - <<'PY'
          import os
          from pathlib import Path

          firmware_dir = Path(f"bin/targets/{os.environ['TARGET']}/{os.environ['SUBTARGET']}")
          device = os.environ["DEVICE"]
          image_suffixes = (
              ".bin",
              ".img",
              ".img.gz",
              ".itb",
              ".tar",
          )

          image_files = sorted(
              p for p in firmware_dir.iterdir()
              if p.is_file()
              and device in p.name
              and p.name.endswith(image_suffixes)
              and not p.name.endswith((".sha256", ".manifest"))
          )
          if not image_files:
              print(f"No firmware images found for {device} in {firmware_dir}")
              for p in sorted(firmware_dir.glob("*")):
                  print(p)
              raise SystemExit(1)

          sysupgrade = next((p for p in image_files if "sysupgrade" in p.name), image_files[0])
          artifact = Path("artifact")
          lines = []

          for src in image_files:
              dst = artifact / src.name
              dst.write_bytes(src.read_bytes())
              lines.append(str(src))

          renamed = artifact / f"{device}-sysupgrade.bin"
          generic = artifact / "sysupgrade.bin"
          renamed.write_bytes(sysupgrade.read_bytes())
          generic.write_bytes(sysupgrade.read_bytes())
          lines.extend([str(sysupgrade), str(sysupgrade)])
          (artifact / "firmware-list.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          sha256sum artifact/* > "artifact/${DEVICE}-sha256sums.txt"

          echo "renamed_file=artifact/${DEVICE}-sysupgrade.bin" >> "$GITHUB_OUTPUT"
          echo "generic_file=artifact/sysupgrade.bin" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.DEVICE }}
          retention-days: 14
          if-no-files-found: error
          path: |
            artifact/*

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ env.DEVICE }}
          retention-days: 14
          if-no-files-found: error
          path: |
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.manifest
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/profiles.json
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/sha256sums
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*buildinfo

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ env.DEVICE }}
          retention-days: 30
          if-no-files-found: warn
          include-hidden-files: true
          path: |
            .config
            build.log
            ccache.log
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*buildinfo
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/sha256sums
            logs/**
            tmp/**/*.log
            tmp/**/*.txt

      - name: Save dl cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: dl
          key: ${{ steps.restore-dl-cache.outputs.cache-primary-key }}

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ steps.restore-ccache.outputs.cache-primary-key }}
