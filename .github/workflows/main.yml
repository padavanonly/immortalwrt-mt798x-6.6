name: Build ImmortalWrt mt798x sysupgrade only

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        device:
          - nradio_c5800-688
          - nradio_c8-688

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v2

      # Cache OpenWrt toolchain and feeds to speed up future builds
      - name: Cache OpenWrt toolchain and feeds
        uses: actions/cache@v2
        with:
          path: |
            ~/.cache/opkg
            ~/.ccache
            /home/runner/work/immortalwrt-mt798x-6.6/immortalwrt-mt798x-6.6/staging_dir/
            /home/runner/work/immortalwrt-mt798x-6.6/immortalwrt-mt798x-6.6/tmp/
          key: ${{ runner.os }}-openwrt-${{ matrix.device }}-${{ hashFiles('**/feeds.conf*') }}-${{ hashFiles('**/config*') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ matrix.device }}-

      # Install required dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git zlib1g-dev libncurses5-dev libssl-dev libelf-dev python3-distutils
          sudo apt-get install -y gawk wget curl unzip
          sudo apt-get install -y git-svn subversion
          sudo apt-get install -y bison flex

      # Prepare feeds
      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # Generate .config for selected device
      - name: Generate .config for ${{ matrix.device }}
        run: |
          make defconfig
          make menuconfig  # Optional: Manually adjust configuration if needed
          make oldconfig  # Ensure configuration is up-to-date

      # Build the firmware (compiling)
      - name: Build firmware
        run: |
          make -j$(nproc) V=s
          # Ensure sysupgrade.bin is generated and force regeneration if necessary
          if [ ! -f "bin/targets/${{ matrix.device }}/sysupgrade.bin" ]; then
            echo "ERROR: sysupgrade.bin not found, trying to force re-generate"
            # Force recompile to ensure sysupgrade.bin is generated
            make -j$(nproc) V=s
          fi
          # Exit with error if still no sysupgrade.bin found
          if [ ! -f "bin/targets/${{ matrix.device }}/sysupgrade.bin" ]; then
            echo "ERROR: sysupgrade.bin still not found, build failed."
            exit 1
          fi

      # Find and upload sysupgrade.bin file
      - name: Find and upload sysupgrade.bin firmware
        run: |
          SYSUPGRADE_FILE="$(find bin -type f -name '*sysupgrade.bin' | head -n 1)"
          echo "Found sysupgrade: $SYSUPGRADE_FILE"
          echo "SYSUPGRADE_FILE=$SYSUPGRADE_FILE" >> "$GITHUB_ENV"
          
      - name: Upload sysupgrade firmware
        uses: actions/upload-artifact@v2
        with:
          name: sysupgrade-firmware-${{ matrix.device }}
          path: ${{ env.SYSUPGRADE_FILE }}

      # Upload build logs if failed
      - name: Upload build logs if failed
        if: failure()
        uses: actions/upload-artifact@v2
        with:
          name: build_logs
          path: build.log
