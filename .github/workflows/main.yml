name: Build ImmortalWrt mt798x sysupgrade only

on:
  workflow_dispatch:
  push:
    branches:
      - openwrt-24.10-6.6

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - device_name: nradio_c5800-688
            config_device: nradio_c5800_688
            artifact_name: nradio-c5800-688
          - device_name: nradio_c8-688
            config_device: nradio_c8_688
            artifact_name: nradio-c8-688

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show disk space
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker image prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libncursesw5-dev libssl-dev \
            python3 python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget libelf-dev subversion libpam0g-dev ccache xsltproc upx-ucl \
            libpython3-dev qemu-utils curl cmake ninja-build pkgconf meson \
            python3-pyelftools device-tree-compiler rename tar time jq

      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config for ${{ matrix.device_name }}
        run: |
          rm -f .config
          cat > .config <<EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_${{ matrix.config_device }}=y
          EOF
          make defconfig
          echo "===== .config target lines ====="
          grep "^CONFIG_TARGET" .config || true

      - name: Check device exists
        run: |
          echo "===== filogic.mk match ====="
          grep -n "${{ matrix.device_name }}" target/linux/mediatek/image/filogic.mk || true

      - name: Download source packages
        run: |
          make download -j"$(nproc)" V=s 2>&1 | tee download.log

      - name: Build firmware
        run: |
          make -j"$(nproc)" V=s 2>&1 | tee build.log

      - name: Show all output files
        if: always()
        run: |
          echo "===== bin files ====="
          find bin -type f | sort || true

      - name: Check sysupgrade.bin exists
        if: success()
        run: |
          SYSUPGRADE_FILE="$(find bin -type f -name '*sysupgrade.bin' | head -n 1)"
          if [ -z "$SYSUPGRADE_FILE" ]; then
            echo "ERROR: no sysupgrade.bin found"
            exit 1
          fi
          echo "Found sysupgrade: $SYSUPGRADE_FILE"
          echo "SYSUPGRADE_FILE=$SYSUPGRADE_FILE" >> "$GITHUB_ENV"

      - name: Show last 200 lines on failure
        if: failure()
        run: |
          echo "===== LAST 200 LINES OF build.log ====="
          tail -n 200 build.log || true
          echo "===== MATCHED ERROR LINES ====="
          grep -nEi "error:|Error |No rule|failed to build|undefined reference|dts|dtc|recipe for target|fatal:" build.log | tail -n 200 || true

      - name: Collect debug files
        if: always()
        run: |
          mkdir -p debug
          cp -f .config debug/ 2>/dev/null || true
          cp -f build.log debug/ 2>/dev/null || true
          cp -f download.log debug/ 2>/dev/null || true
          find logs -type f 2>/dev/null | while read f; do
            mkdir -p "debug/$(dirname "$f")"
            cp -f "$f" "debug/$f"
          done || true
          find bin -type f 2>/dev/null | while read f; do
            mkdir -p "debug/$(dirname "$f")"
            cp -f "$f" "debug/$f"
          done || true

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.device_name }}
          path: debug/

      - name: Upload sysupgrade firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-sysupgrade
          path: ${{ env.SYSUPGRADE_FILE }}
