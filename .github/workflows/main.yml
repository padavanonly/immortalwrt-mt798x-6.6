name: Build ImmortalWrt mt798x devices

on:
  workflow_dispatch:
  push:
    branches:
      - openwrt-24.10-6.6

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - device_name: nradio_c5800_688
            artifact_name: firmware-nradio-c5800-688
          - device_name: nradio_c8_688
            artifact_name: firmware-nradio-c8-688

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show disk space
        run: df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib genisoimage git \
            gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool \
            lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pip python3-ply python3-docutils python3-setuptools \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config for ${{ matrix.device_name }}
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_${{ matrix.device_name }}=y
          EOF
          make defconfig
          echo "==== Selected target ===="
          grep '^CONFIG_TARGET_' .config || true

      - name: Download source packages
        run: |
          make download -j8 V=s || make download -j1 V=s

      - name: Build firmware
        run: |
          make -j"$(nproc)" V=s || make -j1 V=s

      - name: Show output files
        run: |
          find bin/targets -type f | sort || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            bin/targets/**/*
