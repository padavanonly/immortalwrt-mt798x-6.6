name: Build ImmortalWrt filogic firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: "Device to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - nradio_c5800-688
          - nradio_c8-688
  push:
    branches:
      - openwrt-24.10-6.6
    paths:
      - .github/workflows/main.yml
      - target/linux/mediatek/image/filogic.mk
      - target/linux/mediatek/dts/**
      - defconfig/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.device == 'all' || github.event.inputs.device == matrix.device }}
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: nradio_c5800-688
            target: mediatek
            subtarget: filogic
          - device: nradio_c8-688
            target: mediatek
            subtarget: filogic

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget curl ccache subversion device-tree-compiler python3 python3-pyelftools \
            python3-ply python3-docutils libelf-dev ecj fastjar java-propose-classpath \
            libc6-dev-i386 libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libreadline-dev uglifyjs upx-ucl libyaml-dev msmtp texinfo xmlto qemu-utils \
            genisoimage python3-yaml help2man ninja-build p7zip-full

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-${{ matrix.device }}-${{ hashFiles('.github/workflows/main.yml', 'target/linux/mediatek/image/filogic.mk', 'target/linux/mediatek/dts/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.device }}-
            ${{ runner.os }}-

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config
        run: |
          printf '%s\n' \
            'CONFIG_TARGET_mediatek=y' \
            'CONFIG_TARGET_mediatek_mt7981=y' \
            'CONFIG_TARGET_MULTI_PROFILE=n' \
            'CONFIG_TARGET_PER_DEVICE_ROOTFS=n' \
            'CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_${{ matrix.device }}=y' \
            > .config
          make defconfig
          grep -E "CONFIG_TARGET_(mediatek|DEVICE_mediatek_filogic_DEVICE_${{ matrix.device }})" .config

      - name: Download sources
        run: make download -j$(nproc)

      - name: Build firmware
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: make -j$(nproc) V=s

      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          firmware_dir="bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}"
          sysupgrade_file=$(find "$firmware_dir" -maxdepth 1 -type f -name "*${{ matrix.device }}*sysupgrade.bin" | sort | head -n 1)
          if [ -z "$sysupgrade_file" ]; then
            echo "No sysupgrade firmware found for ${{ matrix.device }} in $firmware_dir" >&2
            find "$firmware_dir" -maxdepth 1 -type f | sort >&2
            exit 1
          fi
          echo "sysupgrade_file=$sysupgrade_file" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$sysupgrade_file" > firmware-list.txt

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device }}
          path: |
            ${{ steps.collect.outputs.sysupgrade_file }}
            firmware-list.txt
            bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/*.manifest
            bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/profiles.json
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.device }}
          path: |
            .config
            bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}/config.buildinfo
            logs/**
            tmp/**
          if-no-files-found: warn
