name: Build ImmortalWrt filogic firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: "选择要编译的设备"
        required: true
        default: all
        type: choice
        options:
          - all
          - nradio_c5800-688
          - nradio_c8-688

  push:
    branches:
      - openwrt-24.10-6.6
      - mtwifi-sync-*
    paths:
      - .github/workflows/main.yml
      - target/linux/mediatek/image/filogic.mk
      - target/linux/mediatek/dts/**
      - target/linux/mediatek/filogic/base-files/**
      - package/mtk/drivers/mt_wifi/**
      - package/mtk/drivers/wifi-profile/**
      - package/mtk/applications/mtwifi-cfg/**
      - package/mtk/applications/luci-app-mtwifi-cfg/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.device || 'push' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.device }}" in
              all)
                echo 'matrix={"device":["nradio_c5800-688","nradio_c8-688"]}' >> "$GITHUB_OUTPUT"
                ;;
              nradio_c5800-688)
                echo 'matrix={"device":["nradio_c5800-688"]}' >> "$GITHUB_OUTPUT"
                ;;
              nradio_c8-688)
                echo 'matrix={"device":["nradio_c8-688"]}' >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "Unsupported device: ${{ github.event.inputs.device }}" >&2
                exit 1
                ;;
            esac
          else
            echo 'matrix={"device":["nradio_c5800-688","nradio_c8-688"]}' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.device }}
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    env:
      TARGET: mediatek
      SUBTARGET: filogic
      DEVICE: ${{ matrix.device }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPRESS: "1"
      CCACHE_MAXSIZE: 2G

    steps:
      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        shell: bash
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git rsync swig unzip \
            zlib1g-dev file wget curl ccache subversion device-tree-compiler python3 \
            python3-pyelftools python3-ply python3-docutils python3-setuptools libelf-dev \
            ecj fastjar java-propose-classpath libc6-dev-i386 libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libreadline-dev libssl-dev libncurses5-dev \
            libncursesw5-dev uglifyjs libyaml-dev msmtp texinfo xmlto qemu-utils genisoimage \
            help2man ninja-build p7zip-full ca-certificates squashfs-tools
          ccache --version
          ccache -M "${CCACHE_MAXSIZE}"

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: dl
          key: ${{ runner.os }}-dl-${{ hashFiles('feeds.conf.default', 'include/version.mk', '.github/workflows/main.yml') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-${{ env.DEVICE }}-ccache-${{ hashFiles('.github/workflows/main.yml', 'target/linux/mediatek/image/filogic.mk', 'target/linux/mediatek/dts/**', 'target/linux/mediatek/filogic/base-files/**', 'package/mtk/drivers/mt_wifi/**', 'package/mtk/drivers/wifi-profile/**', 'package/mtk/applications/mtwifi-cfg/**', 'package/mtk/applications/luci-app-mtwifi-cfg/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEVICE }}-ccache-
            ${{ runner.os }}-ccache-

      - name: Update and install feeds
        shell: bash
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config
        shell: bash
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_${DEVICE}=y
          CONFIG_CCACHE=y
          EOF

          make defconfig

          grep -E "CONFIG_TARGET_mediatek|CONFIG_TARGET_mediatek_filogic|CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_${DEVICE}|CONFIG_CCACHE" .config

      - name: Download sources
        shell: bash
        run: |
          set -euxo pipefail
          make download -j"$(nproc)"

      - name: Build firmware
        shell: bash
        run: |
          set -o pipefail
          ccache -z
          make -j"$(nproc)" V=s 2>&1 | tee build.log
          ccache -s | tee ccache.log

      - name: Collect firmware
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          python3 - <<'PY'
          import os
          from pathlib import Path

          firmware_dir = Path(f"bin/targets/{os.environ['TARGET']}/{os.environ['SUBTARGET']}")
          device = os.environ["DEVICE"]

          candidates = sorted(firmware_dir.glob(f"*{device}*sysupgrade.bin"))
          if not candidates:
              print(f"No sysupgrade firmware found for {device} in {firmware_dir}")
              for p in sorted(firmware_dir.glob("*")):
                  print(p)
              raise SystemExit(1)

          src = candidates[0]
          dist = Path("dist")
          renamed = dist / f"{device}-sys.bin"
          generic = dist / "sys.bin"

          renamed.write_bytes(src.read_bytes())
          generic.write_bytes(src.read_bytes())
          (dist / "firmware-list.txt").write_text(str(src) + "\n", encoding="utf-8")
          PY

          sha256sum "dist/${DEVICE}-sys.bin" "dist/sys.bin" > "dist/${DEVICE}-sys.bin.sha256"

          echo "renamed_file=dist/${DEVICE}-sys.bin" >> "$GITHUB_OUTPUT"
          echo "generic_file=dist/sys.bin" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.DEVICE }}
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ steps.collect.outputs.renamed_file }}
            ${{ steps.collect.outputs.generic_file }}
            dist/firmware-list.txt
            dist/${{ env.DEVICE }}-sys.bin.sha256
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.manifest
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/profiles.json
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/sha256sums
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*buildinfo

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ env.DEVICE }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            .config
            build.log
            ccache.log
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*buildinfo
            bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/sha256sums
            logs/**
            tmp/**/*.log
            tmp/**/*.txt
